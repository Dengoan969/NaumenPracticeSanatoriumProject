name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────
  # 1. Lint — проверка качества кода
  # ──────────────────────────────────────────
  lint-frontend:
    name: Lint — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint --ext .js,.jsx src/ --max-warnings=0

      - name: Prettier check
        run: npx prettier --check "src/**/*.{js,jsx,json,css}"

  lint-backend:
    name: Lint — Backend compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Compile check
        run: mvn compile -q

  # ──────────────────────────────────────────
  # 2. Test — unit-тесты
  # ──────────────────────────────────────────
  test-backend:
    name: Test — Backend
    runs-on: ubuntu-latest
    needs: [lint-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn test -q

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/surefire-reports/

  test-frontend:
    name: Test — Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (non-interactive)
        run: CI=true npm test -- --watchAll=false --passWithNoTests

  # ──────────────────────────────────────────
  # 3. Security — проверка зависимостей и секретов
  # ──────────────────────────────────────────
  security-npm:
    name: Security — npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high || true

  security-gitleaks:
    name: Security — gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────
  # 4. Notify — Telegram при провале
  # ──────────────────────────────────────────
  notify:
    name: Notify — Telegram on failure
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend, test-backend, test-frontend, security-npm, security-gitleaks]
    if: failure()
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ CI Failed!
            Репозиторий: ${{ github.repository }}
            Ветка: ${{ github.ref }}
            Коммит: ${{ github.sha }}
            Автор: ${{ github.actor }}
