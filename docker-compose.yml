services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/dengoan969/sanatorium-project:latest
    container_name: sanatorium-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: production
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sanatorium_db
      SPRING_DATASOURCE_USERNAME: sanatorium
      SPRING_DATASOURCE_PASSWORD: sanatorium_secret
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      POLYTECHNIK_APP_JWTSECRET: sanatorium_jwt_secret_key_for_dev
      POLYTECHNIK_APP_JWTEXPIRATIONMS: "86400000"
      POLYTECHNIK_APP_CORS_ALLOWEDORIGINS: http://localhost:3000
      NEWS_UPLOAD_DIR: /app/uploads/news
      FILE_MAX_SIZE: 5MB
      FILE_ALLOWED_TYPES: image/jpeg,image/png,image/gif
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - sanatorium-net

  db:
    image: postgres:17-alpine
    container_name: sanatorium-db
    environment:
      POSTGRES_DB: sanatorium_db
      POSTGRES_USER: sanatorium
      POSTGRES_PASSWORD: sanatorium_secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanatorium -d sanatorium_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - sanatorium-net

  cache:
    image: redis:7-alpine
    container_name: sanatorium-cache
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    networks:
      - sanatorium-net

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - sanatorium-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    networks:
      - sanatorium-net
    restart: unless-stopped
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - sanatorium-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - /var/log:/var/log
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - sanatorium-net
    restart: unless-stopped
    depends_on:
      - loki

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - sanatorium-net
    restart: unless-stopped
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - sanatorium-net
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:

networks:
  sanatorium-net:
    driver: bridge
