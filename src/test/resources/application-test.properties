# Test configuration with H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Liquibase for tests
spring.liquibase.enabled=false

# JWT config for tests
polytechnik.app.jwtSecret=testSecretKeyForJwtTokenThatIsLongEnoughToPassValidation1234567890
polytechnik.app.jwtExpirationMs=86400000

# Disable DataInitializer for tests
app.data-initializer.enabled=false

# File upload
news.upload.dir=test-uploads
file.max-size=5MB
file.allowed-types=image/jpeg,image/png,image/gif